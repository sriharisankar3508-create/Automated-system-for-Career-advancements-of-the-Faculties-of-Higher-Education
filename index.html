<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Career System - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 400px;
      text-align: center;
    }
    .login-container h1 {
      color: #0f3460;
      font-size: 22px;
      margin-bottom: 8px;
    }
    .login-container p {
      color: #888;
      font-size: 13px;
      margin-bottom: 30px;
    }
    .role-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    .role-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #0f3460;
      background: white;
      color: #0f3460;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    .role-btn.active {
      background: #0f3460;
      color: white;
    }
    .input-group {
      margin-bottom: 18px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-size: 14px;
      font-weight: bold;
    }
    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .input-group input:focus {
      border-color: #0f3460;
    }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }
    .login-btn:hover {
      background: #e94560;
    }
    .footer-text {
      margin-top: 20px;
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>🎓 Faculty Career System</h1>
    <p>Automated Career Advancement Portal</p>

    <div class="role-buttons">
      <button class="role-btn active" onclick="setRole('faculty')">
        👤 Faculty
      </button>
      <button class="role-btn" onclick="setRole('admin')">
        🛡️ Admin
      </button>
    </div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="login-btn" onclick="login()">Login →</button>

    <p class="footer-text">© 2026 Faculty Career Advancement System</p>
  </div>

  <script>
    let currentRole = 'faculty';

    function setRole(role) {
      currentRole = role;
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
    }

    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (!username || !password) {
        alert('Please enter username and password!');
        return;
      }

      if (currentRole === 'admin' && username === 'admin' && password === 'admin123') {
        alert('Admin Login Successful!');
        window.location.href = 'admin.html';
      } else if (currentRole === 'faculty' && username === 'faculty' && password === 'faculty123') {
        alert('Faculty Login Successful!');
        window.location.href = 'faculty.html';
      } else {
        alert('Invalid credentials! Try again.');
      }
    }
  </script>
</body>
</html>
